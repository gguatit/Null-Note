<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NullNote | 공유 노트</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
    <link rel="stylesheet" href="/style.css?v=20260412g" />
  </head>
  <body>
    <button id="themeToggleBtn" class="theme-fab" type="button" aria-label="테마 전환">
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="public-wrap">
      <div class="public-card">
        <h1 id="title">불러오는 중...</h1>
        <article id="content"></article>
      </div>
    </div>

    <script src="/theme.js?v=20260412a"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      if (themeToggleBtn && window.NullNoteTheme?.getTheme) {
        const syncThemeButton = () => {
          const dark = window.NullNoteTheme.getTheme() === "dark";
          themeToggleBtn.title = dark ? "라이트 모드 전환" : "다크 모드 전환";
          const moonIcon = themeToggleBtn.querySelector(".icon-moon");
          const sunIcon = themeToggleBtn.querySelector(".icon-sun");
          if (moonIcon && sunIcon) {
            moonIcon.style.display = dark ? "none" : "";
            sunIcon.style.display = dark ? "" : "none";
          }
        };

        syncThemeButton();
        themeToggleBtn.addEventListener("click", () => {
          window.NullNoteTheme.toggleTheme();
          syncThemeButton();
        });
      }

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
      });

      function addCopyButtons(root) {
        const pres = root.querySelectorAll("pre");
        for (const pre of pres) {
          if (pre.querySelector(".copy-code-btn")) continue;
          const btn = document.createElement("button");
          btn.className = "copy-code-btn";
          btn.textContent = "복사";
          btn.addEventListener("click", () => {
            const code = pre.querySelector("code");
            navigator.clipboard.writeText(code?.textContent || pre.textContent || "").then(() => {
              btn.textContent = "복사됨";
              setTimeout(() => { btn.textContent = "복사"; }, 1500);
            });
          });
          pre.style.position = "relative";
          pre.appendChild(btn);
        }
      }

      async function init() {
        const pathParts = location.pathname.split("/");
        const token = pathParts.length >= 3 ? pathParts[2] : null;
        if (!token) {
          document.getElementById("title").textContent = "잘못된 링크입니다.";
          return;
        }

        try {
          const res = await fetch(`/share/${token}`);
          if (!res.ok) {
            document.getElementById("title").textContent = "공유 링크를 찾을 수 없거나 만료되었습니다.";
            return;
          }

          const note = await res.json();
          document.getElementById("title").textContent = note.title || "Untitled";
          const content = document.getElementById("content");
          content.innerHTML = DOMPurify.sanitize(note.rendered_html);

          content.querySelectorAll("pre > code").forEach((code) => {
            const cls = code.className || "";
            if (/(^|\s)(language-mermaid|lang-mermaid|mermaid)(\s|$)/.test(cls)) {
              const pre = code.parentElement;
              const block = document.createElement("div");
              block.className = "mermaid";
              block.textContent = code.textContent || "";
              pre.replaceWith(block);
            }
          });

          addCopyButtons(content);
          Prism.highlightAll();
          await mermaid.run({ nodes: content.querySelectorAll(".mermaid") });
        } catch {
          document.getElementById("title").textContent = "노트를 불러올 수 없습니다.";
        }
      }
      init();
    </script>
  </body>
</html>
