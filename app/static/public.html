<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NullNote Public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
    <link rel="stylesheet" href="/style.css?v=20260409h" />
    <style>
      .public-wrap {
        max-width: 860px;
        margin: 24px auto;
        padding: 0 14px;
      }
      .public-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      .public-card h1 {
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <button id="themeToggleBtn" class="theme-fab" type="button" aria-label="다크 모드 전환">◐</button>
    <div class="public-wrap">
      <div class="public-card">
        <h1 id="title">불러오는 중...</h1>
        <article id="content"></article>
      </div>
    </div>

    <script src="/theme.js?v=20260409f"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      if (themeToggleBtn && window.NullNoteTheme?.getTheme) {
        const syncThemeButton = () => {
          const dark = window.NullNoteTheme.getTheme() === "dark";
          themeToggleBtn.textContent = dark ? "☀" : "◐";
          themeToggleBtn.title = dark ? "라이트 모드 전환" : "다크 모드 전환";
        };

        syncThemeButton();
        themeToggleBtn.addEventListener("click", () => {
          window.NullNoteTheme.toggleTheme();
          syncThemeButton();
        });
      }

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
      });

      function enhanceMermaid(root) {
        const codeNodes = root.querySelectorAll("pre > code");
        for (const code of codeNodes) {
          const cls = code.className || "";
          if (!/(^|\s)(language-mermaid|lang-mermaid|mermaid)(\s|$)/.test(cls)) {
            continue;
          }

          const pre = code.parentElement;
          const block = document.createElement("div");
          block.className = "mermaid";
          block.textContent = code.textContent || "";
          pre.replaceWith(block);
        }
      }

      async function init() {
        const id = new URLSearchParams(location.search).get("id");
        if (!id) {
          document.getElementById("title").textContent = "잘못된 링크입니다.";
          return;
        }

        const res = await fetch(`/notes/${id}`);
        if (!res.ok) {
          document.getElementById("title").textContent = "노트를 불러올 수 없습니다.";
          return;
        }

        const note = await res.json();
        document.getElementById("title").textContent = note.title || "Untitled";
        const content = document.getElementById("content");
        content.innerHTML = note.rendered_html;
        enhanceMermaid(content);
        Prism.highlightAll();
        await mermaid.run({ nodes: content.querySelectorAll(".mermaid") });
      }
      init();
    </script>
  </body>
</html>
