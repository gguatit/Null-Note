<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NullNote | 대시보드</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css" />
    <link rel="stylesheet" href="/style.css?v=20260412i" />
  </head>
  <body class="app-body">
    <header class="app-topbar">
      <div class="left-group">
        <button id="sidebarToggleBtn" class="icon-btn" title="사이드바" aria-label="사이드바 토글">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="0" y1="1" x2="18" y2="1"/><line x1="0" y1="7" x2="18" y2="7"/><line x1="0" y1="13" x2="18" y2="13"/></svg>
        </button>
        <h1 class="logo-text">NullNote</h1>
        <span id="guestBadge" class="guest-badge" hidden>Guest</span>
      </div>
      <div class="right-group">
        <input id="searchInput" class="search-input" type="text" placeholder="노트 검색" aria-label="노트 검색" />
        <span class="hotkey-hint">Ctrl+S</span>
        <button id="themeToggleBtn" class="icon-btn" title="테마 전환" aria-label="테마 전환">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="settingsToggleBtn" class="btn ghost">설정</button>
        <button id="logoutBtn" class="btn ghost">로그인</button>
      </div>
    </header>

    <main class="app-layout" id="appLayout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <h2>내 노트</h2>
          <button id="refreshNotesBtn" class="icon-btn icon-btn-sm" title="새로고침" aria-label="새로고침">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>

        <div class="sidebar-filters" id="sidebarFilters">
          <button id="filterAllBtn" class="filter-btn active" data-filter="all">전체</button>
          <button id="filterFolderBtn" class="filter-btn" data-filter="folder" hidden></button>
          <button id="filterTagBtn" class="filter-btn" data-filter="tag" hidden></button>
        </div>

        <button id="newNoteBtn" class="btn btn-primary">새 노트</button>
        <div id="sidebarWorkspace" class="sidebar-workspace" aria-label="사이드바 작업 영역">
          <ul id="folderTree" class="folder-tree"></ul>
          <ul id="noteList" class="note-list"></ul>
        </div>
      </aside>

      <section class="editor-section">
        <div class="editor-toolbar">
          <div class="page-title-row">
            <input id="titleInput" type="text" placeholder="제목 없음" aria-label="노트 제목" />
          </div>
        </div>
        <div class="editor-content" id="editorContent">
          <div class="editor-pane" id="editorPane">
            <textarea id="contentInput" placeholder="# Markdown을 작성하세요&#10;&#10;우클릭으로 블록 삽입 메뉴를 열 수 있습니다." aria-label="마크다운 편집기"></textarea>
          </div>
          <div id="editorSplitter" class="editor-splitter" title="드래그해서 편집기/미리보기 비율 조절"></div>
          <article id="preview" class="preview-panel"></article>
        </div>

        <div class="note-meta" id="noteMeta" hidden>
          <div class="note-meta-group">
            <span class="note-meta-label">폴더</span>
            <div id="noteFolderChips" class="note-meta-chips"></div>
          </div>
          <div class="note-meta-group">
            <span class="note-meta-label">태그</span>
            <div id="noteTagChips" class="note-meta-chips"></div>
          </div>
        </div>

        <div class="statusbar">
          <span id="wordCount">0자</span>
          <span id="readTime">예상 읽기 0분</span>
          <span id="saveState">저장 대기</span>
        </div>
      </section>

      <aside class="settings-panel" id="settingsPanel">
        <h2>설정</h2>
        <label class="setting-row">
          <span>자동 저장</span>
          <input id="autoSaveToggle" type="checkbox" />
        </label>
        <label class="setting-row">
          <span>미리보기 표시</span>
          <input id="previewToggle" type="checkbox" checked />
        </label>
        <label class="setting-row">
          <span>글자 크기 단위</span>
          <select id="fontSizeUnitSelect">
            <option value="px">px</option>
            <option value="%">%</option>
          </select>
        </label>
        <label class="setting-row">
          <span>글자 크기</span>
          <div class="setting-inline">
            <input id="fontSizeNumber" type="number" min="12" max="32" step="1" />
          </div>
        </label>
        <label class="setting-row">
          <span>줄 간격</span>
          <input id="lineHeightNumber" type="number" min="1.2" max="2.2" step="0.1" />
        </label>
        <label class="setting-row">
          <span>자동 저장 간격</span>
          <select id="autoSaveDelaySelect">
            <option value="700">0.7초</option>
            <option value="1200">1.2초</option>
            <option value="2000">2초</option>
            <option value="3500">3.5초</option>
          </select>
        </label>
        <label class="setting-row">
          <span>에디터 폭</span>
          <select id="editorWidthSelect">
            <option value="full">Full</option>
            <option value="wide">Wide</option>
            <option value="narrow">Narrow</option>
          </select>
        </label>
        <label class="setting-row">
          <span>토스트 표시 시간</span>
          <select id="toastDurationSelect">
            <option value="1600">짧게</option>
            <option value="2400">보통</option>
            <option value="3600">길게</option>
          </select>
        </label>
        <label class="setting-row">
          <span>콤팩트 모드</span>
          <input id="compactModeToggle" type="checkbox" />
        </label>
        <label class="setting-row">
          <span>모션 줄이기</span>
          <input id="reduceMotionToggle" type="checkbox" />
        </label>
        <h3 class="settings-subtitle">노트 작업</h3>
        <div class="setting-actions">
          <button id="pinNoteBtn" class="btn btn-icon" title="고정" aria-label="노트 고정">
            <svg class="pin-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8m0 0a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 8v6m-3 2h6"/></svg>
            고정
          </button>
          <label class="setting-row">
            <span>공개 노트</span>
            <input id="isPublic" type="checkbox" />
          </label>
          <button id="previewQuickToggleBtn" class="btn ghost" type="button">미리보기</button>
          <button id="saveNoteBtn" class="btn">저장</button>
          <button id="deleteNoteBtn" class="btn ghost">삭제</button>
          <button id="copyPublicLinkBtn" class="btn ghost">공개링크</button>
        </div>
        <div class="setting-actions">
          <button id="exportMdBtn" class="btn ghost">MD 내보내기</button>
          <label class="btn ghost file-btn">
            MD 불러오기
            <input id="importMdInput" type="file" accept=".md,text/markdown,text/plain" />
          </label>
          <button id="duplicateNoteBtn" class="btn ghost">노트 복제</button>
          <button id="resetSettingsBtn" class="btn ghost">설정 초기화</button>
        </div>
        <p class="tip">단축키: Ctrl+S 저장</p>
      </aside>
    </main>

    <div id="editorContextMenu" class="editor-context-menu" hidden>
      <div class="context-title">블록 삽입</div>
      <input id="contextMenuSearch" class="context-search" type="text" placeholder="블록 검색" aria-label="블록 검색" />
      <div class="context-subtitle" id="contextRecentTitle" hidden>최근 사용</div>
      <div id="contextRecent" class="context-recent" hidden></div>
      <div class="context-subtitle">기본 블록</div>
      <button type="button" data-action="h1" data-keywords="heading title">제목 1</button>
      <button type="button" data-action="h2" data-keywords="heading subtitle">제목 2</button>
      <button type="button" data-action="h3" data-keywords="heading subtitle">제목 3</button>
      <button type="button" data-action="quote" data-keywords="blockquote">인용문</button>
      <button type="button" data-action="divider" data-keywords="hr separator">구분선</button>
      <button type="button" data-action="todo" data-keywords="check task checklist">체크리스트</button>
      <button type="button" data-action="ul" data-keywords="list bullet">글머리 목록</button>
      <button type="button" data-action="ol" data-keywords="list numbered">번호 목록</button>
      <button type="button" data-action="table" data-keywords="grid column row">표</button>
      <button type="button" data-action="toggle" data-keywords="details fold">토글 섹션</button>
      <div class="context-subtitle">코드/데이터</div>
      <button type="button" data-action="code" data-keywords="codeblock snippet">코드 블록</button>
      <button type="button" data-action="inlineCode" data-keywords="inline code">인라인 코드</button>
      <button type="button" data-action="json" data-keywords="json data">JSON 샘플</button>
      <button type="button" data-action="yaml" data-keywords="yaml config">YAML 샘플</button>
      <button type="button" data-action="bash" data-keywords="shell terminal sh">Bash 스니펫</button>
      <button type="button" data-action="python" data-keywords="py">Python 스니펫</button>
      <button type="button" data-action="ts" data-keywords="typescript tsx">TypeScript 스니펫</button>
      <button type="button" data-action="sql" data-keywords="query database">SQL 스니펫</button>
      <button type="button" data-action="mermaid" data-keywords="diagram flowchart sequence">Mermaid</button>
      <button type="button" data-action="math" data-keywords="katex equation latex">수식 블록</button>
      <div class="context-subtitle">문서 템플릿</div>
      <button type="button" data-action="link" data-keywords="url anchor">링크</button>
      <button type="button" data-action="image" data-keywords="img picture">이미지</button>
      <button type="button" data-action="callout" data-keywords="note info">콜아웃</button>
      <button type="button" data-action="warning" data-keywords="alert caution">주의 콜아웃</button>
      <button type="button" data-action="success" data-keywords="tip success done">완료 콜아웃</button>
      <button type="button" data-action="api" data-keywords="rest request endpoint">API 요청 템플릿</button>
      <button type="button" data-action="meeting" data-keywords="minutes meeting">회의록 템플릿</button>
      <button type="button" data-action="kanban" data-keywords="task board">칸반 템플릿</button>
      <button type="button" data-action="bug" data-keywords="issue defect">버그 리포트 템플릿</button>
      <button type="button" data-action="decision" data-keywords="adr architecture">의사결정 템플릿</button>
      <button type="button" data-action="timeline" data-keywords="schedule plan">타임라인 템플릿</button>
      <button type="button" data-action="footnote" data-keywords="reference citation">각주 템플릿</button>
      <button type="button" data-action="copyDate" data-keywords="today date now">오늘 날짜</button>
    </div>

    <div id="toastArea" class="toast-area" aria-live="polite"></div>

    <div id="sidebarContextMenu" class="sidebar-context-menu" hidden>
      <button id="sidebarMenuCreateFolder" type="button">폴더 만들기</button>
      <button id="sidebarMenuCreateFile" type="button">파일 만들기</button>
      <button id="sidebarMenuCreateSubfolder" type="button">하위 폴더 만들기</button>
      <button id="sidebarMenuCreateFileInFolder" type="button">이 폴더에 파일 만들기</button>
      <hr style="margin:6px 0; border:none; border-top:1px solid #eee;" />
      <button id="sidebarMenuDeleteFolder" type="button">폴더 삭제</button>
      <button id="sidebarMenuDeleteFile" type="button">파일 삭제</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="/theme.js?v=20260412a"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="/editorContextMenu.js?v=20260411a"></script>
    <script src="/dashboard.js?v=20260412f"></script>
  </body>
</html>
