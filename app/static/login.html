<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NullNote | 로그인</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=20260413b" />
  </head>
  <body class="auth-body">
    <main class="auth-card">
      <div class="auth-header">
        <h1>NullNote</h1>
        <p>무채색 집중 노트 공간</p>
      </div>

      <form id="loginForm" class="auth-form">
        <label>
          아이디
          <input id="username" type="text" autocomplete="username" required />
        </label>
        <label>
          비밀번호
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn">로그인</button>
      </form>

      <p class="auth-foot">
        계정이 없나요? <a href="/register">회원가입</a>
      </p>
      <p id="authMessage" class="auth-message"></p>
    </main>

    <script src="/theme.js?v=20260412a"></script>
    <script src="/login.js?v=20260412b"></script>
  </body>
</html>
