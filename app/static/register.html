<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NullNote | 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=20260409m" />
  </head>
  <body class="auth-body">
    <button id="themeToggleBtn" class="theme-fab" type="button" aria-label="다크 모드 전환">◐</button>
    <main class="auth-card">
      <div class="auth-header">
        <h1>계정 만들기</h1>
        <p>NullNote를 시작하세요</p>
      </div>

      <form id="registerForm" class="auth-form">
        <label>
          아이디
          <input id="username" type="text" autocomplete="username" minlength="3" required />
        </label>
        <label>
          비밀번호
          <input id="password" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <label>
          비밀번호 재확인
          <input id="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <div id="passwordRules" class="password-rules" aria-live="polite">
          <div id="passwordRuleSummary" class="password-rule-summary">요구사항 충족: 0/4</div>
          <ul>
            <li id="ruleLength">8자 이상</li>
            <li id="ruleUpper">대문자 1개 이상</li>
            <li id="ruleLower">소문자 1개 이상</li>
            <li id="ruleNumber">숫자 1개 이상</li>
            <li id="ruleMatch">비밀번호 일치</li>
          </ul>
        </div>
        <button type="submit" class="btn">회원가입</button>
      </form>

      <p class="auth-foot">
        이미 계정이 있나요? <a href="/login">로그인</a>
      </p>
      <p id="authMessage" class="auth-message"></p>
    </main>

    <script src="/theme.js?v=20260409m"></script>
    <script src="/register.js?v=20260409n"></script>
  </body>
</html>
